.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:440px}

.auth-card-header .mobile-logo{display:none;font-size:2rem;margin-bottom:8px}
.auth-card-header h2{font-size:1.6rem;font-weight:800;color:#1a1a2e;margin-bottom:6px}

/* Form */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #e0dbd5;border-radius:10px;font-size:.92rem;font-family:inherit;outline:none;background:#fff;transition:border-color .2s,box-shadow .2s;color:#1a1a2e}

.input-wrapper{position:relative}
.input-wrapper .form-input{padding-right:42px}
.input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#aaa;cursor:pointer;font-size:.85rem}

/* Remember me */
.form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:.85rem}
.remember-label{display:flex;align-items:center;gap:8px;cursor:pointer;color:#555}
.remember-label input[type="checkbox"]{display:none}
.remember-box{width:18px;height:18px;border:2px solid #ccc;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:.6rem;color:transparent}
.remember-label input:checked + .remember-box{background:#6B4226;border-color:#6B4226;color:#fff}

.btn-brand:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-social{background:#fff;border:1.5px solid #e0dbd5;color:#333;border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;width:100%}
.btn-social:hover{border-color:#6B4226;background:#faf8f6}

/* Divider */

.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}

<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KKVMVZHK" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="auth-page">
  <!-- Left Panel (데스크톱만) -->
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-logo">🦷</div>
      <h1>서울비디치과에<br>오신 것을 환영합니다</h1>
      <p>로그인하고 회원 전용 서비스를 이용하세요</p>
      <ul class="auth-left-features">
        <li><i class="fas fa-camera"></i> Before/After 치료 사례 열람</li>
        <li><i class="fas fa-calendar-check"></i> 온라인 예약 및 내역 관리</li>
        <li><i class="fas fa-gift"></i> 회원 전용 이벤트 및 할인</li>
        <li><i class="fas fa-bell"></i> 정기검진 알림 서비스</li>
        <li><i class="fas fa-shield-alt"></i> 개인 치료 기록 안전 보관</li>
      </ul>
    </div>
  </div>

  <!-- Right Panel (폼) -->
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="mobile-logo"><a href="/" style="text-decoration:none">🦷</a></div>
        <h2>로그인</h2>
        <p>서울비디치과 회원 서비스에 로그인하세요</p>
      </div>

      <!-- Messages -->
      <div id="errorMsg" class="msg"></div>
      <div id="successMsg" class="msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="example@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            <i class="fas fa-eye input-icon" onclick="togglePw()"></i>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe">
            <span class="remember-box"><i class="fas fa-check"></i></span>
            <span>로그인 유지</span>
          </label>
          <a href="javascript:void(0)" class="forgot-link" onclick="showForgot()">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn btn-brand" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> 로그인
        </button>
      </form>

      <div class="divider"><span>또는</span></div>

      <button type="button" class="btn-social" onclick="window.location.href='/api/auth/google'">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
        <span>Google로 로그인</span>
      </button>

      <div class="auth-links">
        계정이 없으신가요? <a href="/auth/register">회원가입</a>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loader" class="loading-overlay"><div class="spinner"></div></div>

<script>
var errEl = document.getElementById('errorMsg');
var sucEl = document.getElementById('successMsg');

function showErr(m){errEl.textContent=m;errEl.className='msg error';sucEl.className='msg';}
function hideMsg(){errEl.className='msg';sucEl.className='msg';}

// Google OAuth 에러 처리
(function(){
  var params=new URLSearchParams(window.location.search);
  var ge=params.get('error');
  if(ge){
    var msgs={'google_denied':'Google 로그인이 취소되었습니다.','google_invalid':'인증 정보가 올바르지 않습니다. 다시 시도해주세요.','google_token_fail':'Google 인증에 실패했습니다. 다시 시도해주세요.','google_userinfo_fail':'Google 계정 정보를 가져올 수 없습니다.','google_no_email':'Google 계정에 이메일이 없습니다.','google_server_error':'서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.'};
    showErr(msgs[ge]||'Google 로그인에 실패했습니다.');
    history.replaceState(null,'','/auth/login');
  }
})();
// Toggle password
function togglePw(){
  var inp=document.getElementById('password');
  var ico=inp.parentElement.querySelector('.input-icon');
  if(inp.type==='password'){inp.type='text';ico.classList.replace('fa-eye','fa-eye-slash');}
  else{inp.type='password';ico.classList.replace('fa-eye-slash','fa-eye');}
}

// 이미 로그인 상태면 리다이렉트
(async function(){
  try{
    var res=await fetch('/api/auth/me');
    var data=await res.json();
    if(data.loggedIn){
      var params=new URLSearchParams(window.location.search);
      window.location.href=params.get('redirect')||'/auth/mypage';
    }
  }catch(e){}
})();

// 비밀번호 찾기
function showForgot(){
  alert('비밀번호 찾기 기능은 준비 중입니다.\n병원으로 문의해주세요.\n\n전화: 041-415-2892');
}

// 로그인 처리
document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  hideMsg();

  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value;

  if(!email||!pw){showErr('이메일과 비밀번호를 입력해주세요.');return;}

  document.getElementById('loader').classList.add('show');
  document.getElementById('loginBtn').disabled=true;

  try{
    var res=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pw})
    });
    var result=await res.json();
    if(!res.ok||result.error){
      showErr(result.error||'로그인에 실패했습니다.');
      return;
    }
    sucEl.textContent='로그인 성공! '+result.user.name+'님 환영합니다.';
    sucEl.className='msg success';errEl.className='msg';
    // ★ GA4 전환 추적: 로그인 성공
    if (typeof bdAnalytics !== 'undefined' && bdAnalytics.trackLogin) {
      bdAnalytics.trackLogin('email');
    }
    var params=new URLSearchParams(window.location.search);
    var redirect=params.get('redirect')||'/auth/mypage';
    setTimeout(function(){window.location.href=redirect;},800);
  }catch(err){
    showErr('서버 연결에 실패했습니다. 다시 시도해주세요.');
  }finally{
    document.getElementById('loader').classList.remove('show');
    document.getElementById('loginBtn').disabled=false;
  }
});
</script>
</body>
