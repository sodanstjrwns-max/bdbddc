<div class="auth-page">
  <!-- Left Panel (데스크톱만) -->
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-logo">🦷</div>
      <h1>서울비디치과<br>회원이 되어보세요</h1>
      <p>회원 전용 혜택과 편리한 서비스를 경험하세요</p>
      <ul class="auth-left-features">
        <li><i class="fas fa-camera"></i> Before/After 치료 사례 열람</li>
        <li><i class="fas fa-calendar-check"></i> 온라인 예약 및 내역 관리</li>
        <li><i class="fas fa-gift"></i> 회원 전용 이벤트 및 할인</li>
        <li><i class="fas fa-bell"></i> 정기검진 알림 서비스</li>
        <li><i class="fas fa-shield-alt"></i> 개인 치료 기록 안전 보관</li>
      </ul>
    </div>
  </div>

  <!-- Right Panel (폼) -->
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="mobile-logo"><a href="/" style="text-decoration:none">🦷</a></div>
        <h2>회원가입</h2>
        <p>서울비디치과 회원이 되어 다양한 혜택을 누리세요</p>
      </div>

      <!-- Progress -->
      <div class="progress-bar">
        <div class="progress-step active" data-step="1"></div>
        <div class="progress-step" data-step="2"></div>
        <div class="progress-step" data-step="3"></div>
      </div>

      <!-- Messages -->
      <div id="errorMsg" class="msg"></div>
      <div id="successMsg" class="msg"></div>

      <form id="registerForm">
        <!-- Step 1: 계정 정보 -->
        <div class="form-step active" data-step="1">
          <div class="form-group">
            <label class="form-label">이메일 <span class="req">*</span></label>
            <input type="email" id="email" class="form-input" placeholder="example@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호 <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="password" id="password" class="form-input" placeholder="8자 이상, 영문+숫자" required minlength="8" autocomplete="new-password">
              <i class="fas fa-eye input-icon" onclick="togglePw('password')"></i>
            </div>
            <div class="pw-strength"><div class="pw-bar"></div><div class="pw-bar"></div><div class="pw-bar"></div><div class="pw-bar"></div></div>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호 확인 <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호를 다시 입력" required autocomplete="new-password">
              <i class="fas fa-eye input-icon" onclick="togglePw('passwordConfirm')"></i>
            </div>
            <p class="input-hint" id="pwMatchHint"></p>
          </div>
          <button type="button" class="btn btn-brand" onclick="goStep(2)">
            다음 단계 <i class="fas fa-arrow-right"></i>
          </button>
          <div class="divider"><span>또는</span></div>
          <button type="button" class="btn-social" onclick="window.location.href='/api/auth/google'">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
            <span>Google로 가입하기</span>
          </button>
        </div>

        <!-- Step 2: 개인 정보 -->
        <div class="form-step" data-step="2">
          <div class="form-group">
            <label class="form-label">이름 <span class="req">*</span></label>
            <input type="text" id="name" class="form-input" placeholder="실명을 입력하세요" required>
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰 번호 <span class="req">*</span></label>
            <input type="tel" id="phone" class="form-input" placeholder="010-0000-0000" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">생년월일</label>
              <input type="date" id="birthdate" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label">성별</label>
              <select id="gender" class="form-select">
                <option value="">선택 안함</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
              </select>
            </div>
          </div>
          <div class="btn-group">
            <button type="button" class="btn btn-outline" onclick="goStep(1)">
              <i class="fas fa-arrow-left"></i> 이전
            </button>
            <button type="button" class="btn btn-brand" onclick="goStep(3)">
              다음 <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- Step 3: 약관 동의 -->
        <div class="form-step" data-step="3">
          <div class="check-group check-all">
            <label class="check-label">
              <input type="checkbox" id="agreeAll" onchange="toggleAll()">
              <span class="check-box"><i class="fas fa-check"></i></span>
              <span class="check-text" style="font-weight:700">전체 동의</span>
            </label>
          </div>
          <div class="check-group">
            <label class="check-label">
              <input type="checkbox" id="agreedTerms" required>
              <span class="check-box"><i class="fas fa-check"></i></span>
              <span class="check-text">[필수] <a href="/terms" target="_blank">이용약관</a> 동의</span>
            </label>
          </div>
          <div class="check-group">
            <label class="check-label">
              <input type="checkbox" id="agreedPrivacy" required>
              <span class="check-box"><i class="fas fa-check"></i></span>
              <span class="check-text">[필수] <a href="/privacy" target="_blank">개인정보 처리방침</a> 동의</span>
            </label>
          </div>
          <div class="check-group">
            <label class="check-label">
              <input type="checkbox" id="agreedMarketing">
              <span class="check-box"><i class="fas fa-check"></i></span>
              <span class="check-text">[선택] 마케팅 정보 수신 동의</span>
            </label>
          </div>
          <div class="btn-group" style="margin-top:24px">
            <button type="button" class="btn btn-outline" onclick="goStep(2)">
              <i class="fas fa-arrow-left"></i> 이전
            </button>
            <button type="submit" class="btn btn-brand" id="submitBtn">
              <i class="fas fa-user-plus"></i> 가입 완료
            </button>
          </div>
        </div>
      </form>

      <div class="auth-links">
        이미 계정이 있으신가요? <a href="/auth/login">로그인</a>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loader" class="loading-overlay"><div class="spinner"></div></div>

<script>
var errEl = document.getElementById('errorMsg');
var sucEl = document.getElementById('successMsg');

function showErr(m){errEl.textContent=m;errEl.className='msg error';sucEl.className='msg';}
function hideMsg(){errEl.className='msg';sucEl.className='msg';}

// Toggle password
function togglePw(id){
  var inp=document.getElementById(id);
  var ico=inp.parentElement.querySelector('.input-icon');
  if(inp.type==='password'){inp.type='text';ico.classList.replace('fa-eye','fa-eye-slash');}
  else{inp.type='password';ico.classList.replace('fa-eye-slash','fa-eye');}
}

// Password strength
document.getElementById('password').addEventListener('input',function(){
  var v=this.value,s=0;
  if(v.length>=6)s++;if(v.length>=8)s++;
  if(/[A-Za-z]/.test(v)&&/\d/.test(v))s++;
  if(/[^A-Za-z0-9]/.test(v))s++;
  var c=['#ef4444','#f59e0b','#22c55e','#22c55e'];
  document.querySelectorAll('.pw-bar').forEach(function(b,i){
    b.style.background=i<s?c[Math.min(s-1,3)]:'#e5e7eb';
  });
});

// Password match
document.getElementById('passwordConfirm').addEventListener('input',function(){
  var h=document.getElementById('pwMatchHint');
  var pw=document.getElementById('password').value;
  if(this.value&&this.value!==pw){h.textContent='비밀번호가 일치하지 않습니다';h.className='input-hint error';}
  else if(this.value&&this.value===pw){h.textContent='비밀번호가 일치합니다';h.className='input-hint success';}
  else{h.textContent='';h.className='input-hint';}
});

// Phone auto-format
document.getElementById('phone').addEventListener('input',function(){
  var v=this.value.replace(/\D/g,'');
  if(v.length>11)v=v.slice(0,11);
  if(v.length>7)this.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  else if(v.length>3)this.value=v.slice(0,3)+'-'+v.slice(3);
  else this.value=v;
});

// Toggle all checkboxes
function toggleAll(){
  var a=document.getElementById('agreeAll').checked;
  document.getElementById('agreedTerms').checked=a;
  document.getElementById('agreedPrivacy').checked=a;
  document.getElementById('agreedMarketing').checked=a;
}
['agreedTerms','agreedPrivacy','agreedMarketing'].forEach(function(id){
  document.getElementById(id).addEventListener('change',function(){
    document.getElementById('agreeAll').checked=
      document.getElementById('agreedTerms').checked&&
      document.getElementById('agreedPrivacy').checked&&
      document.getElementById('agreedMarketing').checked;
  });
});

// Step navigation
function goStep(target){
  hideMsg();
  var current=document.querySelector('.form-step.active');
  var from=parseInt(current.dataset.step);

  // Validate forward
  if(target>from){
    if(from===1){
      var email=document.getElementById('email').value.trim();
      var pw=document.getElementById('password').value;
      var pwc=document.getElementById('passwordConfirm').value;
      if(!email){showErr('이메일을 입력해주세요.');return;}
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('올바른 이메일 형식이 아닙니다.');return;}
      if(!pw||pw.length<8){showErr('비밀번호는 8자 이상이어야 합니다.');return;}
      if(!/[A-Za-z]/.test(pw)||!/\d/.test(pw)){showErr('비밀번호는 영문+숫자 조합이어야 합니다.');return;}
      if(pw!==pwc){showErr('비밀번호가 일치하지 않습니다.');return;}
    }
    if(from===2){
      var name=document.getElementById('name').value.trim();
      var phone=document.getElementById('phone').value.trim();
      if(!name){showErr('이름을 입력해주세요.');return;}
      if(!phone||!/^01[0-9]-?\d{3,4}-?\d{4}$/.test(phone.replace(/\s/g,''))){showErr('올바른 휴대폰 번호를 입력해주세요.');return;}
    }
  }

  // Switch steps
  document.querySelectorAll('.form-step').forEach(function(s){s.classList.remove('active');});
  document.querySelector('.form-step[data-step="'+target+'"]').classList.add('active');
  document.querySelectorAll('.progress-step').forEach(function(s){
    s.classList.toggle('active',parseInt(s.dataset.step)<=target);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

// Submit
document.getElementById('registerForm').addEventListener('submit',async function(e){
  e.preventDefault();
  hideMsg();
  if(!document.getElementById('agreedTerms').checked||!document.getElementById('agreedPrivacy').checked){
    showErr('필수 약관에 동의해주세요.');return;
  }
  var data={
    email:document.getElementById('email').value.trim(),
    password:document.getElementById('password').value,
    name:document.getElementById('name').value.trim(),
    phone:document.getElementById('phone').value.trim(),
    privacyConsent:true,
    marketingConsent:document.getElementById('agreedMarketing').checked
  };
  document.getElementById('loader').classList.add('show');
  document.getElementById('submitBtn').disabled=true;
  try{
    var res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    var result=await res.json();
    if(!res.ok||result.error){showErr(result.error||'회원가입에 실패했습니다.');return;}
    sucEl.textContent='회원가입 완료! 환영합니다, '+result.user.name+'님';
    sucEl.className='msg success';errEl.className='msg';
    // ★ GA4 전환 추적: 회원가입 완료
    if (typeof bdAnalytics !== 'undefined' && bdAnalytics.trackSignup) {
      bdAnalytics.trackSignup('email');
    }
    var params=new URLSearchParams(window.location.search);
    setTimeout(function(){window.location.href=params.get('redirect')||'/auth/mypage';},1200);
  }catch(err){showErr('서버 연결에 실패했습니다. 다시 시도해주세요.');}
  finally{document.getElementById('loader').classList.remove('show');document.getElementById('submitBtn').disabled=false;}
});
</script>
</body>
</html>
