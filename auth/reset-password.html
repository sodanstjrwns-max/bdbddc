<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>비밀번호 찾기 | 서울비디치과</title>
<meta name="description" content="서울비디치과 비밀번호 재설정 — 가입 이메일로 재설정 링크를 받아 새 비밀번호를 설정하세요.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico?v=2" sizes="48x48"><link rel="icon" type="image/png" sizes="96x96" href="/images/icons/favicon-96.png?v=2"><link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg?v=2">
<meta name="theme-color" content="#6B4226">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f8f6f3;min-height:100vh;color:#1a1a2e}
.auth-page{display:flex;min-height:100vh}
.auth-left{flex:1;background:linear-gradient(135deg,#6B4226 0%,#8B5E3C 50%,#a0714f 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;position:relative;overflow:hidden}
.auth-left-content{position:relative;z-index:1;text-align:center;color:#fff;max-width:400px}
.auth-left-logo{font-size:3rem;margin-bottom:16px}
.auth-left h1{font-size:1.8rem;font-weight:800;margin-bottom:12px;line-height:1.3}
.auth-left p{font-size:1rem;opacity:.85;line-height:1.6}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{width:100%;max-width:440px}
.auth-card-header{text-align:center;margin-bottom:32px}
.auth-card-header .mobile-logo{display:none;font-size:2rem;margin-bottom:8px}
.auth-card-header h2{font-size:1.6rem;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.auth-card-header p{font-size:.9rem;color:#666;line-height:1.6}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #e0dbd5;border-radius:10px;font-size:.92rem;font-family:inherit;outline:none;background:#fff;transition:border-color .2s,box-shadow .2s;color:#1a1a2e}
.form-input:focus{border-color:#6B4226;box-shadow:0 0 0 3px rgba(107,66,38,.1)}
.form-input::placeholder{color:#aaa}
.input-wrapper{position:relative}
.input-wrapper .form-input{padding-right:42px}
.input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#aaa;cursor:pointer;font-size:.85rem}
.input-icon:hover{color:#6B4226}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-brand{background:#6B4226;color:#fff}
.btn-brand:hover{background:#5a3720;transform:translateY(-1px);box-shadow:0 4px 12px rgba(107,66,38,.3)}
.btn-brand:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.msg{padding:12px 16px;border-radius:10px;font-size:.85rem;font-weight:500;display:none;margin-bottom:16px;line-height:1.6}
.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
.msg.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;display:block}
.auth-links{text-align:center;margin-top:24px;font-size:.88rem;color:#888}
.auth-links a{color:#6B4226;font-weight:600;text-decoration:none}
.auth-links a:hover{text-decoration:underline}
.help-box{margin-top:28px;padding:14px 16px;background:#faf8f6;border:1px solid #eee5dc;border-radius:10px;font-size:.8rem;color:#777;line-height:1.7}
.help-box i{color:#6B4226;margin-right:6px}
@media(max-width:900px){
  .auth-left{display:none}
  .auth-right{padding:24px 20px;align-items:flex-start;padding-top:60px}
  .auth-card-header .mobile-logo{display:block}
}
</style>
</head>
<body>
<div class="auth-page">
  <aside class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-logo">🦷</div>
      <h1>비밀번호를 잊으셨나요?</h1>
      <p>가입하신 이메일로 재설정 링크를 보내드립니다.<br>메일함(스팸함 포함)을 확인해주세요.</p>
    </div>
  </aside>
  <main class="auth-right">
    <div class="auth-card">

      <!-- STEP 1: 이메일 입력 (재설정 요청) -->
      <section id="requestSection">
        <div class="auth-card-header">
          <div class="mobile-logo">🦷</div>
          <h2>비밀번호 찾기</h2>
          <p>가입하신 이메일 주소를 입력하시면<br>비밀번호 재설정 링크를 보내드립니다.</p>
        </div>
        <div class="msg" id="reqMsg"></div>
        <form id="requestForm">
          <div class="form-group">
            <label class="form-label" for="email">이메일</label>
            <input type="email" id="email" class="form-input" placeholder="가입한 이메일을 입력하세요" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-brand" id="reqBtn"><i class="fas fa-paper-plane"></i> 재설정 링크 보내기</button>
        </form>
        <div class="help-box">
          <i class="fas fa-circle-info"></i>구글 로그인으로 가입하셨다면 별도 비밀번호 없이 <a href="/api/auth/google" style="color:#6B4226;font-weight:600;">구글 로그인</a>을 이용하세요. 메일이 오지 않으면 병원(041-415-2892)으로 문의해주세요.
        </div>
      </section>

      <!-- STEP 2: 새 비밀번호 설정 (?token= 있을 때) -->
      <section id="resetSection" style="display:none">
        <div class="auth-card-header">
          <div class="mobile-logo">🦷</div>
          <h2>새 비밀번호 설정</h2>
          <p>사용하실 새 비밀번호를 입력해주세요.</p>
        </div>
        <div class="msg" id="resetMsg"></div>
        <form id="resetForm">
          <div class="form-group">
            <label class="form-label" for="newPassword">새 비밀번호</label>
            <div class="input-wrapper">
              <input type="password" id="newPassword" class="form-input" placeholder="6자 이상" required autocomplete="new-password" minlength="6">
              <i class="fas fa-eye input-icon" id="togglePw"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-brand" id="resetBtn"><i class="fas fa-key"></i> 비밀번호 변경하기</button>
        </form>
      </section>

      <div class="auth-links">
        <a href="/auth/login"><i class="fas fa-arrow-left" style="font-size:.75rem"></i> 로그인으로 돌아가기</a>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var token = params.get('token');

  var reqSection = document.getElementById('requestSection');
  var resetSection = document.getElementById('resetSection');

  if (token) { reqSection.style.display = 'none'; resetSection.style.display = 'block'; }

  function showMsg(el, text, type){ el.textContent = text; el.className = 'msg ' + type; }

  // STEP 1: 재설정 링크 요청
  document.getElementById('requestForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = document.getElementById('reqBtn');
    var msg = document.getElementById('reqMsg');
    var email = document.getElementById('email').value.trim();
    btn.disabled = true;
    try {
      var res = await fetch('/api/auth/forgot-password', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: email })
      });
      var data = await res.json();
      if (res.ok) {
        showMsg(msg, data.message || '재설정 링크가 발송되었습니다. 메일함을 확인해주세요.', 'success');
      } else {
        showMsg(msg, data.error || '요청 처리 중 오류가 발생했습니다.', 'error');
        btn.disabled = false;
      }
    } catch(err) {
      showMsg(msg, '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'error');
      btn.disabled = false;
    }
  });

  // 비밀번호 표시 토글
  document.getElementById('togglePw').addEventListener('click', function(){
    var pw = document.getElementById('newPassword');
    var isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    this.className = 'fas input-icon ' + (isPw ? 'fa-eye-slash' : 'fa-eye');
  });

  // STEP 2: 새 비밀번호 설정
  document.getElementById('resetForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = document.getElementById('resetBtn');
    var msg = document.getElementById('resetMsg');
    var pw = document.getElementById('newPassword').value;
    var pw2 = document.getElementById('confirmPassword').value;
    if (pw.length < 6) { showMsg(msg, '비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
    if (pw !== pw2) { showMsg(msg, '비밀번호가 일치하지 않습니다.', 'error'); return; }
    btn.disabled = true;
    try {
      var res = await fetch('/api/auth/reset-password', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token: token, password: pw })
      });
      var data = await res.json();
      if (res.ok) {
        showMsg(msg, '비밀번호가 변경되었습니다! 3초 후 로그인 페이지로 이동합니다.', 'success');
        setTimeout(function(){ location.href = '/auth/login?reset=success'; }, 3000);
      } else {
        showMsg(msg, data.error || '변경 처리 중 오류가 발생했습니다.', 'error');
        btn.disabled = false;
      }
    } catch(err) {
      showMsg(msg, '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'error');
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
