<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-sidebar: #141620;
  --bg-hover: #222538;
  --border: #2a2d3e;
  --text: #e4e6ef;
  --text-dim: #8b8fa3;
  --text-muted: #5d6178;
  --accent: #6B4226;
  --accent-light: #8B5E3C;
  --accent-glow: rgba(107,66,38,0.15);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.1);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.1);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }
a { color:inherit; text-decoration:none; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:260px; min-height:100vh; background:var(--bg-sidebar); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:fixed; left:0; top:0; bottom:0; z-index:100;
  transition: transform var(--transition);
}
.sidebar-header { padding:24px 20px; border-bottom:1px solid var(--border); }
.sidebar-brand { display:flex; align-items:center; gap:12px; }
.sidebar-brand-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent-light)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
.sidebar-brand-text h2 { font-size:0.95rem; font-weight:700; color:var(--text); line-height:1.2; }
.sidebar-brand-text span { font-size:0.72rem; color:var(--text-muted); font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }

.sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
.nav-section { margin-bottom:24px; }
.nav-section-label { font-size:0.68rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; padding:0 8px; margin-bottom:8px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm); color:var(--text-dim); font-size:0.88rem; font-weight:500; transition:all var(--transition); cursor:pointer; margin-bottom:2px; }
.nav-item:hover { background:var(--bg-hover); color:var(--text); }
.nav-item.active { background:var(--accent-glow); color:#d4956a; font-weight:600; }
.nav-item.active i { color:#d4956a; }
.nav-item i { width:18px; text-align:center; font-size:0.85rem; }
.nav-item .badge-count { margin-left:auto; background:var(--accent); color:#fff; font-size:0.65rem; padding:2px 7px; border-radius:10px; font-weight:600; }

.sidebar-footer { padding:16px 12px; border-top:1px solid var(--border); }
.nav-item.logout { color:var(--red); }
.nav-item.logout:hover { background:var(--red-bg); }

/* ===== MAIN ===== */
.main { flex:1; margin-left:260px; min-height:100vh; }
.topbar { height:64px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:var(--bg-sidebar); position:sticky; top:0; z-index:50; }
.topbar h1 { font-size:1.1rem; font-weight:700; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.topbar-time { font-size:0.82rem; color:var(--text-dim); }
.topbar-avatar { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent-light)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:#fff; }
.mobile-menu-btn { display:none; background:none; border:none; color:var(--text); font-size:1.2rem; cursor:pointer; padding:8px; }

.content { padding:32px; }

/* ===== STATS ===== */
.stats-row { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.stat-card .stat-label { font-size:0.78rem; color:var(--text-muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.stat-card .stat-value { font-size:1.6rem; font-weight:800; }
.stat-card .stat-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; margin-bottom:10px; }

/* ===== FILTER BAR ===== */
.filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.filter-btn { padding:8px 16px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-dim); border-radius:20px; font-size:0.82rem; font-weight:500; cursor:pointer; transition:all var(--transition); font-family:inherit; }
.filter-btn:hover { border-color:var(--accent); color:var(--text); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.filter-search { flex:1; min-width:200px; padding:8px 16px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); border-radius:20px; font-size:0.85rem; font-family:inherit; outline:none; }
.filter-search:focus { border-color:var(--accent); }
.filter-search::placeholder { color:var(--text-muted); }

/* ===== TABLE ===== */
.table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.table-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.table-title { font-size:0.95rem; font-weight:700; display:flex; align-items:center; gap:8px; }
.table-count { font-size:0.78rem; color:var(--text-muted); }

table { width:100%; border-collapse:collapse; }
thead th { padding:12px 16px; text-align:left; font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15); }
tbody td { padding:14px 16px; font-size:0.85rem; border-bottom:1px solid var(--border); vertical-align:middle; }
tbody tr:hover { background:var(--bg-hover); }
tbody tr:last-child td { border-bottom:none; }

/* Status Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:6px; font-size:0.72rem; font-weight:600; }
.badge-pending { background:var(--orange-bg); color:var(--orange); }
.badge-confirmed { background:var(--blue-bg); color:var(--blue); }
.badge-completed { background:var(--green-bg); color:var(--green); }
.badge-cancelled { background:var(--red-bg); color:var(--red); }
.badge-noshow { background:rgba(100,100,100,0.15); color:#888; }

/* Action Buttons */
.actions { display:flex; gap:6px; }
.btn-sm { padding:6px 10px; border:1px solid var(--border); background:var(--bg); border-radius:6px; font-size:0.75rem; color:var(--text-dim); cursor:pointer; transition:all var(--transition); font-family:inherit; }
.btn-sm:hover { border-color:var(--accent); color:var(--text); }
.btn-sm.danger:hover { border-color:var(--red); color:var(--red); background:var(--red-bg); }

/* Detail Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:200; }
.modal-overlay.show { display:flex; }
.modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); width:90%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:1rem; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text-dim); font-size:1.2rem; cursor:pointer; padding:4px 8px; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:24px; }
.detail-row { display:flex; margin-bottom:16px; }
.detail-label { width:100px; flex-shrink:0; font-size:0.8rem; color:var(--text-muted); font-weight:600; padding-top:2px; }
.detail-value { flex:1; font-size:0.88rem; line-height:1.5; }
.detail-value.phone a { color:var(--blue); }

/* Status Select */
.status-select { padding:8px 12px; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:8px; font-size:0.85rem; font-family:inherit; outline:none; cursor:pointer; width:100%; }
.status-select:focus { border-color:var(--accent); }

/* Memo */
.memo-textarea { width:100%; padding:10px 12px; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:8px; font-size:0.85rem; font-family:inherit; outline:none; resize:vertical; min-height:80px; }
.memo-textarea:focus { border-color:var(--accent); }
.memo-textarea::placeholder { color:var(--text-muted); }

.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
.btn-primary { padding:10px 20px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all var(--transition); }
.btn-primary:hover { background:var(--accent-light); }
.btn-ghost { padding:10px 20px; background:transparent; color:var(--text-dim); border:1px solid var(--border); border-radius:8px; font-size:0.85rem; font-weight:500; cursor:pointer; font-family:inherit; }
.btn-ghost:hover { border-color:var(--text-dim); color:var(--text); }

/* Empty State */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state i { font-size:2.5rem; margin-bottom:16px; opacity:0.4; display:block; }
.empty-state p { font-size:0.9rem; }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--text-muted); }
.loading i { animation: spin 1s linear infinite; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; padding:14px 24px; border-radius:10px; font-size:0.85rem; font-weight:500; color:#fff; z-index:300; opacity:0; transform:translateY(20px); transition:all 0.3s ease; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }

/* Mobile */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
  .mobile-menu-btn { display:block; }
  .content { padding:16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .filter-bar { flex-direction:column; }
  .filter-search { width:100%; }
  table { font-size:0.8rem; }
  thead th, tbody td { padding:10px 10px; }
  .actions { flex-direction:column; }
}
</style>

<script>
(function() {
  'use strict';

  let allReservations = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let currentEditId = null;

  const STATUS_LABELS = {
    pending: '대기중',
    confirmed: '확인됨',
    completed: '완료',
    cancelled: '취소',
    noshow: '노쇼'
  };

  const STATUS_CLASS = {
    pending: 'badge-pending',
    confirmed: 'badge-confirmed',
    completed: 'badge-completed',
    cancelled: 'badge-cancelled',
    noshow: 'badge-noshow'
  };

  // ===== Load Reservations =====
  async function loadReservations() {
    try {
      const res = await fetch('/api/admin/reservations');
      if (res.status === 401) {
        window.location.href = '/admin/login';
        return;
      }
      if (!res.ok) throw new Error('Failed to load');
      allReservations = await res.json();
      updateStats();
      renderTable();
    } catch (err) {
      console.error('Load error:', err);
      document.getElementById('loadingState').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:var(--red)"></i> 데이터 로드 실패. 새로고침해주세요.';
    }
  }

  // ===== Stats =====
  function updateStats() {
    const counts = { pending:0, confirmed:0, completed:0, cancelled:0, noshow:0 };
    allReservations.forEach(function(r) {
      if (counts[r.status] !== undefined) counts[r.status]++;
      else counts.pending++;
    });
    document.getElementById('statPending').textContent = counts.pending;
    document.getElementById('statConfirmed').textContent = counts.confirmed;
    document.getElementById('statCompleted').textContent = counts.completed;
    document.getElementById('statTotal').textContent = allReservations.length;
    document.getElementById('rsvCount').textContent = counts.pending > 0 ? counts.pending : '-';
  }

  // ===== Render Table =====
  function renderTable() {
    var filtered = allReservations.filter(function(r) {
      if (currentFilter !== 'all' && r.status !== currentFilter) return false;
      if (currentSearch) {
        var q = currentSearch.toLowerCase();
        var searchable = (r.name + ' ' + r.phone + ' ' + r.treatment + ' ' + (r.message || '')).toLowerCase();
        if (!searchable.includes(q)) return false;
      }
      return true;
    });

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('tableCount').textContent = filtered.length + '건';

    if (filtered.length === 0) {
      document.getElementById('emptyState').style.display = '';
      document.getElementById('reservationTable').style.display = 'none';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('reservationTable').style.display = '';

    var html = '';
    filtered.forEach(function(r) {
      var statusClass = STATUS_CLASS[r.status] || 'badge-pending';
      var statusLabel = STATUS_LABELS[r.status] || '대기중';
      var dateTime = r.date + ' ' + r.time;
      var created = formatDate(r.createdAt);
      var phoneDisplay = formatPhone(r.phone);

      html += '<tr onclick="openDetail(\'' + r.id + '\')" style="cursor:pointer">';
      html += '<td><span class="badge ' + statusClass + '"><i class="fas fa-circle" style="font-size:5px"></i> ' + statusLabel + '</span></td>';
      html += '<td><strong>' + escHtml(r.name) + '</strong></td>';
      html += '<td>' + phoneDisplay + '</td>';
      html += '<td>' + escHtml(r.treatment) + '</td>';
      html += '<td>' + escHtml(dateTime) + '</td>';
      html += '<td style="color:var(--text-muted);font-size:0.8rem">' + created + '</td>';
      html += '<td><div class="actions">';
      html += '<button class="btn-sm" onclick="event.stopPropagation();openDetail(\'' + r.id + '\')"><i class="fas fa-eye"></i></button>';
      html += '<button class="btn-sm danger" onclick="event.stopPropagation();deleteReservation(\'' + r.id + '\',\'' + escHtml(r.name) + '\')"><i class="fas fa-trash"></i></button>';
      html += '</div></td>';
      html += '</tr>';
    });

    document.getElementById('tableBody').innerHTML = html;
  }

  // ===== Open Detail Modal =====
  window.openDetail = function(id) {
    var r = allReservations.find(function(x) { return x.id === id; });
    if (!r) return;
    currentEditId = id;

    var html = '';
    html += '<div class="detail-row"><div class="detail-label">이름</div><div class="detail-value"><strong>' + escHtml(r.name) + '</strong></div></div>';
    html += '<div class="detail-row"><div class="detail-label">연락처</div><div class="detail-value phone"><a href="tel:' + escHtml(r.phone) + '">' + formatPhone(r.phone) + '</a></div></div>';
    html += '<div class="detail-row"><div class="detail-label">진료과목</div><div class="detail-value">' + escHtml(r.treatment) + '</div></div>';
    html += '<div class="detail-row"><div class="detail-label">희망일</div><div class="detail-value">' + escHtml(r.date) + '</div></div>';
    html += '<div class="detail-row"><div class="detail-label">희망시간</div><div class="detail-value">' + escHtml(r.time) + '</div></div>';

    if (r.message) {
      html += '<div class="detail-row"><div class="detail-label">메시지</div><div class="detail-value" style="background:var(--bg);padding:10px 12px;border-radius:8px;font-size:0.85rem;line-height:1.6">' + escHtml(r.message) + '</div></div>';
    }

    html += '<div class="detail-row"><div class="detail-label">마케팅</div><div class="detail-value">' + (r.marketing ? '<span style="color:var(--green)"><i class="fas fa-check"></i> 동의</span>' : '<span style="color:var(--text-muted)">미동의</span>') + '</div></div>';
    html += '<div class="detail-row"><div class="detail-label">접수일시</div><div class="detail-value" style="color:var(--text-muted);font-size:0.82rem">' + formatDateTime(r.createdAt) + '</div></div>';

    if (r.updatedAt) {
      html += '<div class="detail-row"><div class="detail-label">최종수정</div><div class="detail-value" style="color:var(--text-muted);font-size:0.82rem">' + formatDateTime(r.updatedAt) + '</div></div>';
    }

    html += '<hr style="border:none;border-top:1px solid var(--border);margin:20px 0">';

    // Status
    html += '<div class="detail-row"><div class="detail-label">상태</div><div class="detail-value">';
    html += '<select class="status-select" id="modalStatus">';
    ['pending','confirmed','completed','cancelled','noshow'].forEach(function(s) {
      html += '<option value="' + s + '"' + (r.status === s ? ' selected' : '') + '>' + STATUS_LABELS[s] + '</option>';
    });
    html += '</select></div></div>';

    // Admin Memo
    html += '<div class="detail-row"><div class="detail-label">관리메모</div><div class="detail-value">';
    html += '<textarea class="memo-textarea" id="modalMemo" placeholder="내부 메모 (환자에게 보이지 않음)">' + escHtml(r.adminMemo || '') + '</textarea>';
    html += '</div></div>';

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('detailModal').classList.add('show');
  };

  // ===== Save =====
  window.saveReservation = async function() {
    if (!currentEditId) return;
    var status = document.getElementById('modalStatus').value;
    var memo = document.getElementById('modalMemo').value;

    try {
      var res = await fetch('/api/admin/reservations/' + currentEditId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status, adminMemo: memo })
      });
      if (!res.ok) throw new Error('Update failed');

      // Update local
      var idx = allReservations.findIndex(function(x) { return x.id === currentEditId; });
      if (idx >= 0) {
        allReservations[idx].status = status;
        allReservations[idx].adminMemo = memo;
        allReservations[idx].updatedAt = new Date().toISOString();
      }

      closeModal();
      updateStats();
      renderTable();
      showToast('저장 완료', 'success');
    } catch (err) {
      showToast('저장 실패: ' + err.message, 'error');
    }
  };

  // ===== Delete =====
  window.deleteReservation = async function(id, name) {
    if (!confirm(name + ' 님의 예약을 삭제하시겠습니까?\n\n삭제된 데이터는 복구할 수 없습니다.')) return;

    try {
      var res = await fetch('/api/admin/reservations/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');

      allReservations = allReservations.filter(function(x) { return x.id !== id; });
      updateStats();
      renderTable();
      showToast('삭제 완료', 'success');
    } catch (err) {
      showToast('삭제 실패: ' + err.message, 'error');
    }
  };

  // ===== Modal =====
  window.closeModal = function() {
    document.getElementById('detailModal').classList.remove('show');
    currentEditId = null;
  };

  // ===== Filters =====
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.getAttribute('data-filter');
      renderTable();
    });
  });

  document.getElementById('searchInput').addEventListener('input', function() {
    currentSearch = this.value.trim();
    renderTable();
  });

  // ===== Helpers =====
  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatPhone(phone) {
    if (!phone) return '';
    var p = String(phone).replace(/[\s-]/g,'');
    if (p.length === 11) return p.slice(0,3) + '-' + p.slice(3,7) + '-' + p.slice(7);
    if (p.length === 10) return p.slice(0,3) + '-' + p.slice(3,6) + '-' + p.slice(6);
    return phone;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr);
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    } catch(e) { return dateStr; }
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr);
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0')
        + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    } catch(e) { return dateStr; }
  }

  function showToast(msg, type) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(function() { toast.classList.remove('show'); }, 3000);
  }

  // ===== Time =====
  function updateClock() {
    var now = new Date();
    var el = document.getElementById('currentTime');
    if (el) el.textContent = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 30000);

  // ===== Sidebar Toggle =====
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
  };

  // Close modal on overlay click
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ===== Init =====
  loadReservations();
})();
</script>

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){})});}
</script>
