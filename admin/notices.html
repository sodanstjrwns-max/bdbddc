<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 관리 | 서울비디치과 관리자</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0f1117; --bg-card: #1a1d27; --bg-sidebar: #141620; --bg-hover: #222538;
  --border: #2a2d3e; --text: #e4e6ef; --text-dim: #8b8fa3; --text-muted: #5d6178;
  --accent: #6B4226; --accent-light: #8B5E3C; --accent-glow: rgba(107,66,38,0.15);
  --green: #22c55e; --green-bg: rgba(34,197,94,0.1);
  --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
  --purple: #a855f7; --purple-bg: rgba(168,85,247,0.1);
  --orange: #f59e0b; --orange-bg: rgba(245,158,11,0.1);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.1);
  --radius: 12px; --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:inherit;text-decoration:none}

.sidebar{width:260px;min-height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform var(--transition)}
.sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border)}
.sidebar-brand{display:flex;align-items:center;gap:12px}
.sidebar-brand-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff}
.sidebar-brand-text h2{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.2}
.sidebar-brand-text span{font-size:.72rem;color:var(--text-muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section{margin-bottom:24px}
.nav-section-label{font-size:.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-dim);font-size:.88rem;font-weight:500;transition:all var(--transition);cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:#d4956a;font-weight:600}
.nav-item.active i{color:#d4956a}
.nav-item i{width:18px;text-align:center;font-size:.85rem}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.nav-item.logout{color:var(--red)}
.nav-item.logout:hover{background:var(--red-bg)}

.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg-sidebar);position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-left h1{font-size:1.1rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:8px}
.content{padding:28px 32px;max-width:1200px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.mini-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px}
.mini-stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.mini-stat-value{font-size:1.4rem;font-weight:800}
.mini-stat-label{font-size:.72rem;color:var(--text-muted)}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-box{position:relative}
.search-box input{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:9px 14px 9px 36px;border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;outline:none;width:260px;transition:border-color var(--transition)}
.search-box input:focus{border-color:var(--accent)}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.8rem}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:inherit;transition:background var(--transition)}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:var(--bg-hover);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--transition)}
.btn-secondary:hover{border-color:var(--accent)}

/* Notice cards */
.notice-grid{display:grid;gap:12px}
.notice-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:flex-start;gap:16px;transition:all var(--transition)}
.notice-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.notice-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.notice-icon.important{background:var(--red-bg);color:var(--red)}
.notice-icon.normal{background:var(--blue-bg);color:var(--blue)}
.notice-icon.event{background:var(--purple-bg);color:var(--purple)}
.notice-content{flex:1;min-width:0}
.notice-title{font-size:.95rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.notice-title .pin{color:var(--orange);font-size:.75rem}
.notice-excerpt{font-size:.82rem;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notice-meta{font-size:.72rem;color:var(--text-muted);margin-top:8px;display:flex;gap:16px}
.notice-actions{display:flex;gap:6px;flex-shrink:0;align-self:center}
.action-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all var(--transition)}
.action-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--accent)}
.action-btn.delete:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.status-badge{font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:600}
.status-badge.published{background:var(--green-bg);color:var(--green)}
.status-badge.draft{background:var(--orange-bg);color:var(--orange)}

.empty-state{padding:60px 20px;text-align:center;color:var(--text-muted)}
.empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty-state h3{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--text-dim)}
.empty-state p{font-size:.82rem}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg-hover);color:var(--text)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.form-group label .req{color:var(--red)}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius-sm);font-size:.88rem;font-family:inherit;outline:none;transition:border-color var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:140px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-check{display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer}
.form-check input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}

.toast{position:fixed;bottom:32px;right:32px;background:var(--green);color:#fff;padding:14px 24px;border-radius:var(--radius);font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:10px;transform:translateY(100px);opacity:0;transition:all .3s;z-index:300;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.5)}
  .main{margin-left:0}.topbar{padding:0 16px}.content{padding:20px 16px}
  .mobile-menu-btn{display:block}.stats-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-box input{width:100%}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sidebar-overlay.open{display:block}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">BD</div>
      <div class="sidebar-brand-text"><h2>서울비디치과</h2><span>Admin Console</span></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-label">Overview</div><a href="/admin/" class="nav-item"><i class="fas fa-th-large"></i> 대시보드</a></div>
    <div class="nav-section"><div class="nav-section-label">Content</div>
      <a href="/admin/cases" class="nav-item"><i class="fas fa-images"></i> Before/After</a>
      <a href="/admin/notices" class="nav-item active"><i class="fas fa-megaphone"></i> 공지사항</a>
    </div>
    <div class="nav-section"><div class="nav-section-label">Links</div>
      <a href="/" target="_blank" rel="noopener" class="nav-item"><i class="fas fa-external-link-alt"></i> 사이트 보기</a>
      <a href="/notice/" target="_blank" rel="noopener" class="nav-item"><i class="fas fa-bullhorn"></i> 공지 페이지</a>
    </div>
  </nav>
  <div class="sidebar-footer"><a href="/admin/logout" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</a></div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-bullhorn" style="color:var(--green);margin-right:8px;"></i> 공지사항 관리</h1>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> 새 공지</button>
    </div>
  </header>

  <div class="content">
    <div class="stats-row">
      <div class="mini-stat">
        <div class="mini-stat-icon" style="background:var(--blue-bg);color:var(--blue)"><i class="fas fa-file-alt"></i></div>
        <div><div class="mini-stat-value" id="statTotal">0</div><div class="mini-stat-label">전체 공지</div></div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-icon" style="background:var(--green-bg);color:var(--green)"><i class="fas fa-check-circle"></i></div>
        <div><div class="mini-stat-value" id="statPublished">0</div><div class="mini-stat-label">공개 중</div></div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-icon" style="background:var(--orange-bg);color:var(--orange)"><i class="fas fa-thumbtack"></i></div>
        <div><div class="mini-stat-value" id="statPinned">0</div><div class="mini-stat-label">고정 공지</div></div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="공지사항 검색..." id="searchInput" oninput="renderNotices()"></div>
    </div>

    <div class="notice-grid" id="noticeGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <i class="fas fa-bell-slash"></i>
      <h3>등록된 공지사항이 없습니다</h3>
      <p>상단의 "새 공지" 버튼으로 공지사항을 작성해보세요</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="noticeModal">
  <div class="modal">
    <div class="modal-header">
      <h2><i class="fas fa-bullhorn" style="color:var(--green)"></i> <span id="modalTitle">새 공지사항</span></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="noticeForm" onsubmit="return false">
        <input type="hidden" id="noticeId">
        <div class="form-group"><label>제목 <span class="req">*</span></label><input type="text" id="noticeTitle" required placeholder="공지사항 제목"></div>
        <div class="form-row">
          <div class="form-group"><label>유형</label>
            <select id="noticeType">
              <option value="normal">일반</option>
              <option value="important">중요</option>
              <option value="event">이벤트</option>
            </select>
          </div>
          <div class="form-group"><label>상태</label>
            <select id="noticeStatus">
              <option value="published">공개</option>
              <option value="draft">비공개</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>내용 <span class="req">*</span></label><textarea id="noticeContent" required placeholder="공지사항 내용을 입력하세요..."></textarea></div>
        <label class="form-check"><input type="checkbox" id="noticePinned"> 상단에 고정</label>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveNotice()"><i class="fas fa-save"></i> 저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">저장되었습니다</span></div>

<script>
const STORAGE_KEY = 'bd_notices';
let notices = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let editingId = null;
const TYPES = {normal:'일반',important:'중요',event:'이벤트'};

function renderNotices() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = notices.filter(n => !q || (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
  // Sort: pinned first, then by date
  filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0) || new Date(b.updatedAt||b.createdAt||0) - new Date(a.updatedAt||a.createdAt||0));

  document.getElementById('statTotal').textContent = notices.length;
  document.getElementById('statPublished').textContent = notices.filter(n=>n.status==='published').length;
  document.getElementById('statPinned').textContent = notices.filter(n=>n.pinned).length;

  const grid = document.getElementById('noticeGrid');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(n => {
    const d = new Date(n.updatedAt||n.createdAt||Date.now()).toLocaleDateString('ko-KR');
    const iconClass = n.type === 'important' ? 'important' : n.type === 'event' ? 'event' : 'normal';
    const iconName = n.type === 'important' ? 'fa-exclamation-triangle' : n.type === 'event' ? 'fa-gift' : 'fa-bell';
    return `<div class="notice-card">
      <div class="notice-icon ${iconClass}"><i class="fas ${iconName}"></i></div>
      <div class="notice-content">
        <div class="notice-title">${n.pinned ? '<i class="fas fa-thumbtack pin"></i>' : ''}${n.title||'제목 없음'} <span class="status-badge ${n.status||'published'}">${n.status==='draft'?'비공개':'공개'}</span></div>
        <div class="notice-excerpt">${(n.content||'').replace(/\n/g,' ')}</div>
        <div class="notice-meta"><span><i class="far fa-calendar"></i> ${d}</span><span><i class="fas fa-tag"></i> ${TYPES[n.type]||'일반'}</span></div>
      </div>
      <div class="notice-actions">
        <button class="action-btn" onclick="editNotice('${n.id}')" title="수정"><i class="fas fa-pen"></i></button>
        <button class="action-btn delete" onclick="deleteNotice('${n.id}')" title="삭제"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '공지사항 수정' : '새 공지사항';
  if (id) {
    const n = notices.find(x => x.id === id);
    if (n) {
      document.getElementById('noticeTitle').value = n.title||'';
      document.getElementById('noticeType').value = n.type||'normal';
      document.getElementById('noticeStatus').value = n.status||'published';
      document.getElementById('noticeContent').value = n.content||'';
      document.getElementById('noticePinned').checked = !!n.pinned;
    }
  } else {
    document.getElementById('noticeForm').reset();
  }
  document.getElementById('noticeModal').classList.add('open');
}
function closeModal() { document.getElementById('noticeModal').classList.remove('open'); editingId = null; }
function editNotice(id) { openModal(id); }
function deleteNotice(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  notices = notices.filter(n => n.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notices));
  renderNotices(); showToast('삭제되었습니다', true);
}
function saveNotice() {
  const title = document.getElementById('noticeTitle').value.trim();
  const content = document.getElementById('noticeContent').value.trim();
  if (!title || !content) { showToast('제목과 내용을 입력하세요', true); return; }
  const data = {
    title, content,
    type: document.getElementById('noticeType').value,
    status: document.getElementById('noticeStatus').value,
    pinned: document.getElementById('noticePinned').checked,
    updatedAt: new Date().toISOString()
  };
  if (editingId) {
    const idx = notices.findIndex(n => n.id === editingId);
    if (idx >= 0) notices[idx] = { ...notices[idx], ...data };
  } else {
    data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    data.createdAt = new Date().toISOString();
    notices.unshift(data);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notices));
  closeModal(); renderNotices(); showToast('저장되었습니다');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
renderNotices();
</script>
</body>
</html>
