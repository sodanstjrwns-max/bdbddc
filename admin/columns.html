<!DOCTYPE html>
<html lang="ko">
<head>
<script src="https://cdn.amplitude.com/script/87529341cb075dcdbefabce3994958aa.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컬럼 관리 | 서울비디치과 관리자</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0f1117; --bg-card: #1a1d27; --bg-sidebar: #141620; --bg-hover: #222538;
  --border: #2a2d3e; --text: #e4e6ef; --text-dim: #8b8fa3; --text-muted: #5d6178;
  --accent: #6B4226; --accent-light: #8B5E3C; --accent-glow: rgba(107,66,38,0.15);
  --green: #22c55e; --green-bg: rgba(34,197,94,0.1);
  --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
  --purple: #a855f7; --purple-bg: rgba(168,85,247,0.1);
  --orange: #f59e0b; --orange-bg: rgba(245,158,11,0.1);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.1);
  --radius: 12px; --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:inherit;text-decoration:none}

.sidebar{width:260px;min-height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform var(--transition)}
.sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border)}
.sidebar-brand{display:flex;align-items:center;gap:12px}
.sidebar-brand-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff}
.sidebar-brand-text h2{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.2}
.sidebar-brand-text span{font-size:.72rem;color:var(--text-muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section{margin-bottom:24px}
.nav-section-label{font-size:.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-dim);font-size:.88rem;font-weight:500;transition:all var(--transition);cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:#d4956a;font-weight:600}
.nav-item.active i{color:#d4956a}
.nav-item i{width:18px;text-align:center;font-size:.85rem}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.nav-item.logout{color:var(--red)}
.nav-item.logout:hover{background:var(--red-bg)}

.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg-sidebar);position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-left h1{font-size:1.1rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:8px}
.content{padding:28px 32px;max-width:1400px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.mini-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px}
.mini-stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.mini-stat-value{font-size:1.4rem;font-weight:800}
.mini-stat-label{font-size:.72rem;color:var(--text-muted)}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-box{position:relative}
.search-box input{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:9px 14px 9px 36px;border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;outline:none;width:240px}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.8rem}
.filter-select{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius-sm);font-size:.82rem;font-family:inherit;outline:none;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:inherit;transition:background var(--transition)}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:var(--bg-hover);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}

.table-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 16px;text-align:left;font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg-sidebar)}
tbody td{padding:14px 16px;font-size:.85rem;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:var(--bg-hover)}
.status-badge{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:600}
.status-badge.published{background:var(--green-bg);color:var(--green)}
.status-badge.draft{background:var(--orange-bg);color:var(--orange)}
.action-btns{display:flex;gap:6px}
.action-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;transition:all var(--transition)}
.action-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--accent)}
.action-btn.delete:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.empty-state{padding:60px 20px;text-align:center;color:var(--text-muted)}
.empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty-state h3{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--text-dim)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:760px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.form-group label .req{color:var(--red)}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius-sm);font-size:.88rem;font-family:inherit;outline:none}
.form-group textarea{resize:vertical;min-height:200px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.img-upload-box{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all var(--transition);position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-upload-box:hover{border-color:var(--accent);background:var(--accent-glow)}
.img-upload-box.has-image{border-style:solid;border-color:var(--green);padding:8px}
.img-upload-box img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm)}
.img-upload-box input[type="file"]{display:none}
.img-upload-box .remove-btn{position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--red);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity var(--transition)}
.img-upload-box:hover .remove-btn{opacity:1}

.toast{position:fixed;bottom:32px;right:32px;background:var(--green);color:#fff;padding:14px 24px;border-radius:var(--radius);font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:10px;transform:translateY(100px);opacity:0;transition:all .3s;z-index:300;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}

.content-editor{font-family:'Pretendard',monospace;line-height:1.7}
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.editor-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.editor-btn:hover{background:var(--bg-hover);color:var(--text)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.mobile-menu-btn{display:block}
  .stats-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sidebar-overlay.open{display:block}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">BD</div>
      <div class="sidebar-brand-text"><h2>서울비디치과</h2><span>Admin Console</span></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-label">Overview</div><a href="/admin/" class="nav-item"><i class="fas fa-th-large"></i> 대시보드</a></div>
    <div class="nav-section"><div class="nav-section-label">Content</div>
      <a href="/admin/cases" class="nav-item"><i class="fas fa-images"></i> Before/After</a>
      <a href="/admin/columns" class="nav-item active"><i class="fas fa-pen-nib"></i> 원장 컬럼</a>
      <a href="/admin/notices" class="nav-item"><i class="fas fa-megaphone"></i> 공지사항</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">CRM</div>
      <a href="/admin/reservations" class="nav-item"><i class="fas fa-calendar-check"></i> 예약/문의</a>
    </div>
    <div class="nav-section"><div class="nav-section-label">Links</div>
      <a href="/" target="_blank" class="nav-item"><i class="fas fa-external-link-alt"></i> 사이트 보기</a>
      <a href="/column/" target="_blank" class="nav-item"><i class="fas fa-eye"></i> 컬럼 보기</a>
    </div>
  </nav>
  <div class="sidebar-footer"><a href="/admin/logout" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</a></div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-pen-nib" style="color:var(--blue);margin-right:8px;"></i> 원장 컬럼 관리</h1>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> 새 컬럼</button>
    </div>
  </header>

  <div class="content">
    <div class="stats-row">
      <div class="mini-stat"><div class="mini-stat-icon" style="background:var(--blue-bg);color:var(--blue)"><i class="fas fa-pen-nib"></i></div><div><div class="mini-stat-value" id="statTotal">0</div><div class="mini-stat-label">전체 컬럼</div></div></div>
      <div class="mini-stat"><div class="mini-stat-icon" style="background:var(--green-bg);color:var(--green)"><i class="fas fa-check-circle"></i></div><div><div class="mini-stat-value" id="statPublished">0</div><div class="mini-stat-label">게시중</div></div></div>
      <div class="mini-stat"><div class="mini-stat-icon" style="background:var(--orange-bg);color:var(--orange)"><i class="fas fa-pencil-alt"></i></div><div><div class="mini-stat-value" id="statDraft">0</div><div class="mini-stat-label">임시저장</div></div></div>
    </div>

    <div class="toolbar">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="컬럼 검색..." oninput="filterColumns()" id="searchInput"></div>
        <select class="filter-select" id="filterDoctor" onchange="filterColumns()">
          <option value="">전체 원장</option>
          <option value="문석준 원장">문석준 원장</option>
          <option value="김민수 원장">김민수 원장</option>
          <option value="현정민 원장">현정민 원장</option>
          <option value="이승엽 원장">이승엽 원장</option>
          <option value="김민규 원장">김민규 원장</option>
          <option value="임지원 원장">임지원 원장</option>
          <option value="조설아 원장">조설아 원장</option>
          <option value="강민지 원장">강민지 원장</option>
          <option value="김민진 원장">김민진 원장</option>
          <option value="박상현 원장">박상현 원장</option>
          <option value="서희원 원장">서희원 원장</option>
          <option value="이병민 원장">이병민 원장</option>
          <option value="강경민 원장">강경민 원장</option>
          <option value="최종훈 원장">최종훈 원장</option>
          <option value="박수빈 원장">박수빈 원장</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead><tr><th>썸네일</th><th>제목</th><th>원장</th><th>카테고리</th><th><i class="fas fa-eye" style="margin-right:4px"></i>조회</th><th>상태</th><th>작성일</th><th>관리</th></tr></thead>
        <tbody id="columnsTable"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none">
        <i class="fas fa-pen-nib"></i>
        <h3>등록된 컬럼이 없습니다</h3>
        <p>"새 컬럼" 버튼으로 원장 컬럼을 작성해보세요</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="colModal">
  <div class="modal">
    <div class="modal-header">
      <h2><i class="fas fa-pen-nib" style="color:var(--blue)"></i> <span id="modalTitle">새 컬럼 작성</span></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="colForm" onsubmit="return false">
        <input type="hidden" id="colId">
        <div class="form-group"><label>제목 <span class="req">*</span></label><input type="text" id="colTitle" required placeholder="예: 치과 공포증, 이렇게 극복합니다"></div>
        <div class="form-row">
          <div class="form-group"><label>작성 원장 <span class="req">*</span></label>
            <select id="colDoctor" required>
              <option value="">선택</option>
              <optgroup label="대표원장"><option value="문석준 원장">문석준 원장</option><option value="김민수 원장">김민수 원장</option><option value="현정민 원장">현정민 원장</option></optgroup>
              <optgroup label="임플란트"><option value="이승엽 원장">이승엽 원장</option></optgroup>
              <optgroup label="교정"><option value="김민규 원장">김민규 원장</option><option value="임지원 원장">임지원 원장</option></optgroup>
              <optgroup label="보존"><option value="조설아 원장">조설아 원장</option><option value="강민지 원장">강민지 원장</option></optgroup>
              <optgroup label="소아"><option value="김민진 원장">김민진 원장</option><option value="박상현 원장">박상현 원장</option><option value="서희원 원장">서희원 원장</option></optgroup>
              <optgroup label="내과"><option value="이병민 원장">이병민 원장</option></optgroup>
              <optgroup label="종합진료"><option value="강경민 원장">강경민 원장</option><option value="최종훈 원장">최종훈 원장</option><option value="박수빈 원장">박수빈 원장</option></optgroup>
            </select>
          </div>
          <div class="form-group"><label>카테고리</label>
            <select id="colCategory">
              <option value="">선택 (선택사항)</option>
              <option value="진료 이야기">진료 이야기</option>
              <option value="치과 상식">치과 상식</option>
              <option value="환자 소통">환자 소통</option>
              <option value="치료 후기">치료 후기</option>
              <option value="의료 칼럼">의료 칼럼</option>
              <option value="Q&A">Q&A</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>썸네일 이미지</label>
          <div class="img-upload-box" id="thumbBox" onclick="document.getElementById('thumbFile').click()">
            <input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)">
            <div class="upload-placeholder">
              <i class="fas fa-image" style="font-size:1.3rem;color:var(--text-muted);margin-bottom:6px;"></i>
              <div style="font-size:.78rem;color:var(--text-dim)">클릭하여 이미지 업로드</div>
            </div>
          </div>
          <input type="hidden" id="colThumb">
        </div>
        <div class="form-group">
          <label>본문 <span class="req">*</span></label>
          <div class="editor-toolbar">
            <button type="button" class="editor-btn" onclick="insertTag('h2')" title="제목"><b>H2</b></button>
            <button type="button" class="editor-btn" onclick="insertTag('h3')" title="소제목"><b>H3</b></button>
            <button type="button" class="editor-btn" onclick="insertTag('strong')" title="굵게"><i class="fas fa-bold"></i></button>
            <button type="button" class="editor-btn" onclick="insertTag('em')" title="기울임"><i class="fas fa-italic"></i></button>
            <button type="button" class="editor-btn" onclick="insertTag('blockquote')" title="인용"><i class="fas fa-quote-left"></i></button>
            <button type="button" class="editor-btn" onclick="insertParagraph()" title="문단"><i class="fas fa-paragraph"></i></button>
            <button type="button" class="editor-btn" onclick="insertBr()" title="줄바꿈"><i class="fas fa-level-down-alt"></i></button>
          </div>
          <textarea id="colContent" required placeholder="HTML 형식으로 본문을 작성하세요.&#10;&#10;<p>첫 번째 문단</p>&#10;<h2>소제목</h2>&#10;<p>두 번째 문단</p>" class="content-editor" rows="12"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group"><label>상태</label>
            <select id="colStatus">
              <option value="published">게시</option>
              <option value="draft">임시저장</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveColumn()" id="saveBtn"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let columns = [];
let colViewsMap = {};

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

async function loadColumns() {
  try {
    const res = await fetch('/api/admin/columns');
    if (!res.ok) { window.location.href = '/admin/login'; return; }
    columns = await res.json();
    // 조회수 로드
    try {
      const vRes = await fetch('/api/views?type=column');
      if (vRes.ok) { const vd = await vRes.json(); colViewsMap = {}; vd.forEach(function(v){ colViewsMap[v.page_id] = v.view_count; }); }
    } catch(e) {}
    renderTable();
    updateStats();
  } catch(e) { showToast('로드 실패', true); }
}

function updateStats() {
  document.getElementById('statTotal').textContent = columns.length;
  document.getElementById('statPublished').textContent = columns.filter(c => c.status === 'published').length;
  document.getElementById('statDraft').textContent = columns.filter(c => c.status === 'draft').length;
}

function filterColumns() {
  renderTable();
}

function renderTable() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const doctor = document.getElementById('filterDoctor').value;
  let filtered = columns.filter(c => {
    if (search && !c.title?.toLowerCase().includes(search) && !c.doctorName?.toLowerCase().includes(search)) return false;
    if (doctor && c.doctorName !== doctor) return false;
    return true;
  });
  filtered.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

  const tbody = document.getElementById('columnsTable');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = filtered.map(c => {
    const date = new Date(c.createdAt || Date.now()).toLocaleDateString('ko-KR');
    const excerpt = (c.content || '').replace(/<[^>]*>/g, '').slice(0, 40);
    return `<tr>
      <td>${c.thumbnailImage ? `<img src="${c.thumbnailImage}" style="width:60px;height:40px;border-radius:6px;object-fit:cover;">` : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td><strong>${c.title || ''}</strong><br><span style="font-size:.75rem;color:var(--text-muted)">${excerpt}</span></td>
      <td>${c.doctorName || ''}</td>
      <td>${c.category || '—'}</td>
      <td style="font-weight:600;color:${(colViewsMap[c.id]||0)>0?'var(--blue)':'var(--text-muted)'}"><i class="fas fa-eye" style="margin-right:3px;font-size:.7rem"></i>${(colViewsMap[c.id]||0).toLocaleString()}</td>
      <td><span class="status-badge ${c.status}">${c.status === 'published' ? '게시중' : '임시'}</span></td>
      <td style="font-size:.8rem;color:var(--text-dim)">${date}</td>
      <td><div class="action-btns">
        <button class="action-btn" onclick="editColumn('${c.id}')" title="수정"><i class="fas fa-edit"></i></button>
        <a class="action-btn" href="/column/${c.id}" target="_blank" title="보기"><i class="fas fa-eye"></i></a>
        <button class="action-btn delete" onclick="deleteColumn('${c.id}')" title="삭제"><i class="fas fa-trash-alt"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}

function openModal(col) {
  document.getElementById('colId').value = col?.id || '';
  document.getElementById('colTitle').value = col?.title || '';
  document.getElementById('colDoctor').value = col?.doctorName || '';
  document.getElementById('colCategory').value = col?.category || '';
  document.getElementById('colContent').value = col?.content || '';
  document.getElementById('colStatus').value = col?.status || 'published';
  document.getElementById('colThumb').value = col?.thumbnailImage || '';
  document.getElementById('modalTitle').textContent = col ? '컬럼 수정' : '새 컬럼 작성';

  // 썸네일 미리보기
  const thumbBox = document.getElementById('thumbBox');
  if (col?.thumbnailImage) {
    thumbBox.classList.add('has-image');
    thumbBox.innerHTML = `<input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)"><img src="${col.thumbnailImage}"><button type="button" class="remove-btn" onclick="event.stopPropagation();removeThumb()"><i class="fas fa-times"></i></button>`;
  } else {
    thumbBox.classList.remove('has-image');
    thumbBox.innerHTML = `<input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)"><div class="upload-placeholder"><i class="fas fa-image" style="font-size:1.3rem;color:var(--text-muted);margin-bottom:6px;"></i><div style="font-size:.78rem;color:var(--text-dim)">클릭하여 이미지 업로드</div></div>`;
  }

  document.getElementById('colModal').classList.add('open');
}

function closeModal() {
  document.getElementById('colModal').classList.remove('open');
}

function editColumn(id) {
  const col = columns.find(c => c.id === id);
  if (col) openModal(col);
}

async function saveColumn() {
  const id = document.getElementById('colId').value;
  const title = document.getElementById('colTitle').value.trim();
  const doctorName = document.getElementById('colDoctor').value;
  const category = document.getElementById('colCategory').value;
  const content = document.getElementById('colContent').value;
  const status = document.getElementById('colStatus').value;
  const thumbnailImage = document.getElementById('colThumb').value;

  if (!title || !doctorName || !content) { showToast('필수 항목을 입력해주세요', true); return; }

  const body = { title, doctorName, category, content, status, thumbnailImage };
  if (id) body.id = id;

  try {
    const res = await fetch('/api/admin/columns', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) throw new Error('저장 실패');
    showToast(id ? '컬럼이 수정되었습니다' : '새 컬럼이 등록되었습니다');
    closeModal();
    await loadColumns();
  } catch(e) { showToast('저장 중 오류가 발생했습니다', true); }
}

async function deleteColumn(id) {
  if (!confirm('이 컬럼을 삭제하시겠습니까?')) return;
  try {
    const res = await fetch(`/api/admin/columns/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    showToast('컬럼이 삭제되었습니다');
    await loadColumns();
  } catch(e) { showToast('삭제 실패', true); }
}

async function uploadThumb(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('image', file);
  try {
    const res = await fetch('/api/images/upload', { method: 'POST', body: formData });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const url = data.url || data.imageUrl;
    document.getElementById('colThumb').value = url;
    const box = document.getElementById('thumbBox');
    box.classList.add('has-image');
    box.innerHTML = `<input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)"><img src="${url}"><button type="button" class="remove-btn" onclick="event.stopPropagation();removeThumb()"><i class="fas fa-times"></i></button>`;
    showToast('이미지 업로드 완료');
  } catch(e) { showToast('이미지 업로드 실패', true); }
}

function removeThumb() {
  document.getElementById('colThumb').value = '';
  const box = document.getElementById('thumbBox');
  box.classList.remove('has-image');
  box.innerHTML = `<input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)"><div class="upload-placeholder"><i class="fas fa-image" style="font-size:1.3rem;color:var(--text-muted);margin-bottom:6px;"></i><div style="font-size:.78rem;color:var(--text-dim)">클릭하여 이미지 업로드</div></div>`;
}

// Simple HTML editor helpers
function insertTag(tag) {
  const ta = document.getElementById('colContent');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  const replacement = `<${tag}>${sel || '텍스트'}</${tag}>`;
  ta.value = ta.value.substring(0, start) + replacement + ta.value.substring(end);
  ta.focus();
}
function insertParagraph() {
  const ta = document.getElementById('colContent');
  const pos = ta.selectionStart;
  ta.value = ta.value.substring(0, pos) + '\n<p></p>\n' + ta.value.substring(pos);
  ta.focus();
}
function insertBr() {
  const ta = document.getElementById('colContent');
  const pos = ta.selectionStart;
  ta.value = ta.value.substring(0, pos) + '<br>' + ta.value.substring(pos);
  ta.focus();
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.className = 'toast' + (isError ? ' error' : '');
  t.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
loadColumns();
</script>
</body>
</html>
