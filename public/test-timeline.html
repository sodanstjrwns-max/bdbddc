<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Test</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/site-v5.css">
<style>
/* FORCE timeline visibility - override test */
.tl-step { opacity: 1 !important; transform: none !important; }
.tl-card { background: #fff !important; border: 2px solid #E8E6E3 !important; border-radius: 20px !important; padding: 28px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important; }
.tl-dot { width: 48px !important; height: 48px !important; border-radius: 50% !important; background: #6B4226 !important; color: #fff !important; display: flex !important; align-items: center !important; justify-content: center !important; font-weight: 900 !important; }
.tl-progress-wrap { background: rgba(255,255,255,0.95) !important; padding: 16px 0 12px !important; border-bottom: 1px solid #E8E6E3 !important; }
.tl-progress-bar { height: 6px !important; background: #E8E6E3 !important; border-radius: 9999px !important; }
.tl-progress-fill { height: 100% !important; width: 30% !important; background: linear-gradient(90deg, #6B4226, #C8A97E) !important; border-radius: 9999px !important; }
</style>
</head><body>
<div style="max-width:1240px;margin:0 auto;padding:96px 24px 24px;">
<h1 style="text-align:center;font-size:2rem;margin-bottom:2rem;">Timeline CSS Test</h1>

<section class="section tl-section" id="treatmentTimeline">
  <div class="container">
    <div class="section-header">
      <span class="section-badge"><i class="fas fa-shoe-prints"></i> Test</span>
      <h2>타임라인 <span class="text-gradient">테스트</span></h2>
      <p class="section-subtitle">CSS 적용 확인용</p>
    </div>
    <div class="tl-progress-wrap" id="tlProgressWrap">
      <div class="tl-progress-bar"><div class="tl-progress-fill" id="tlProgressFill"></div></div>
      <div class="tl-progress-labels">
        <span class="tl-plabel active" data-step="0">1단계</span>
        <span class="tl-plabel" data-step="1">2단계</span>
      </div>
    </div>
    <div class="tl-vertical">
      <div class="tl-step" data-step="0">
        <div class="tl-line-seg"><div class="tl-dot"><span>1</span></div><div class="tl-connector"></div></div>
        <div class="tl-card">
          <div class="tl-card-icon"><i class="fas fa-x-ray"></i></div>
          <div class="tl-card-body">
            <h3>테스트 단계</h3>
            <p>이 카드가 흰 배경 + 테두리 + 그림자로 보이면 CSS 정상!</p>
            <div class="tl-meta-row">
              <span class="tl-meta"><i class="far fa-clock"></i> 약 10분</span>
              <span class="tl-meta tl-pain"><i class="fas fa-smile"></i> 무통</span>
            </div>
            <div class="tl-tip"><i class="fas fa-lightbulb"></i><span>팁 박스도 보이면 OK!</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</div></body></html>
